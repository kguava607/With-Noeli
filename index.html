<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>with noeli</title>

  <style>
    :root {
      /* Swap these with your color scheme */
      --bg: #f8f3ed;
      --text: #2b2521;
      --accent: #b98f73;
      --accent-dark: #7f5f4e;
      --card: #ffffff;
      --line: #d8c7b8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 32px 20px 18px;
      text-align: center;
    }

    .site-title {
      font-size: 42px;
      font-weight: normal;
      letter-spacing: 1px;
      margin: 0 0 24px;
      text-transform: lowercase;
    }

    nav {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      max-width: 900px;
      margin: 0 auto;
      padding: 14px 0;
    }

    nav a {
      color: var(--text);
      text-decoration: none;
      margin: 0 28px;
      font-size: 16px;
    }

    nav a:hover {
      color: var(--accent-dark);
    }

    .section {
      max-width: 900px;
      margin: 70px auto;
      padding: 0 20px;
      text-align: center;
    }

    .section h2 {
      font-size: 30px;
      font-weight: normal;
      margin-bottom: 18px;
      display: inline-block;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 6px;
    }

    .about-text {
      max-width: 600px;
      margin: 0 auto;
      font-size: 18px;
      line-height: 1.7;
    }

    .featured-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      margin-top: 36px;
    }

    .session-card {
      background: var(--card);
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 4px;
    }

    .session-card img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      display: block;
      background: #eee;
    }

    .session-card h3 {
      font-size: 22px;
      font-weight: normal;
      margin: 14px 0 4px;
    }

    .contact-box {
      max-width: 500px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      padding: 30px;
    }

    .button {
      display: inline-block;
      margin-top: 14px;
      padding: 12px 20px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      border-radius: 3px;
    }

    .button:hover {
      background: var(--accent-dark);
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      color: var(--accent-dark);
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .site-title {
        font-size: 34px;
      }

      nav a {
        display: inline-block;
        margin: 8px 14px;
      }

      .featured-grid {
        grid-template-columns: 1fr;
      }

      .session-card img {
        height: 260px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1 class="site-title">with noeli</h1>

    <nav>
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#sessions">Sessions</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main id="home">

    <section id="about" class="section">
      <h2>About</h2>
      <p class="about-text">
        I’m Noeli. Write a short intro here about who you are, what you do,
        and what people can expect from your sessions.
      </p>
    </section>

    <section id="sessions" class="section">
      <h2>Featured Sessions</h2>

      <div class="featured-grid">

        <div class="session-card">
          <img src="images/kala.jpg" alt="Kayla session photo">
          <h3>Kala</h3>
        </div>

        <div class="session-card">
          <img src="images/fancylady.jpg" alt="FancyLadypicture">
          <h3>Grenadier</h3>
        </div>

        <div class="session-card">
          <img src="images/grads.jpg" alt="Gradpicture">
          <h3>Taynná & Pedro</h3>
        </div>

      </div>
    </section>

    <section id="contact" class="section">
      <h2>Contact</h2>

      <div class="contact-box">
        <p>Ready to book or ask a question?</p>
        <a class="button" href="mailto:youremail@example.com">Email Me</a>
      </div>
    </section>

  </main>

  <footer>
    © 2026 with noeli
  </footer>

</body>
</html>
